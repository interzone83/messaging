<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Jessica</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.5em;
            flex-shrink: 0;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #f9f9f9;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            clear: both;
        }
        .from-them {
            background: #e0e0e0;
            align-self: flex-start;
            float: left;
        }
        .from-you {
            background: #4caf50;
            color: white;
            align-self: flex-end;
            float: right;
            margin-left: auto;
        }
        .footer {
            background-color: #333;
            display: flex;
            padding: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .footer input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-right: 10px;
        }
        .footer button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">Jessica</div>
    <div class="chat-container">
        <div class="message from-them">Hey, where are you?</div>

<div class="message from-you">I'm at the club downstairs.</div>

<div class="message from-them">I'm here too. I can't see you.</div>

<div class="message from-you">I'm at the bar.</div>

<div class="message from-them">Are you the one with the Corona?</div>

<div class="message from-you">Yeah, that's me.</div>

<div class="message from-them">Cool. Heading over to you now.</div>
    </div>
    <div class="footer">
        <input type="text" placeholder="Type a message...">
        <button>Send</button>
    </div>
</body>
</html>
