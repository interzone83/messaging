<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Form Generator</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .form {
            margin-bottom: 20px;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            background-color: #f9f9f9;
            padding: 10px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            clear: both;
        }
        .from-them {
            background: #e0e0e0;
            align-self: flex-start;
            float: left;
        }
        .from-you {
            background: #4caf50;
            color: white;
            align-self: flex-end;
            float: right;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="form">
        <label for="sender">Sender:</label>
        <select id="sender">
            <option value="from-them">Jessica</option>
            <option value="from-you">You        
        
        
        
        
        
        
            </select>
        <br>
        <label for="message">Message:</label>
        <input type="text" id="message" placeholder="Type your message" style="width: 100%; padding: 8px; margin-top: 5px;">
        <br>
        <button type="button" onclick="addMessage()">Add Message</button>
    </div>
    <div class="chat-container" id="chat-container">
        <!-- Messages will appear here -->
    </div>
    <script>
        function addMessage() {
            const sender = document.getElementById('sender').value;
            const messageText = document.getElementById('message').value;
            if (messageText.trim() === '') return;

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;
            messageDiv.textContent = messageText;
            document.getElementById('chat-container').appendChild(messageDiv);

            // Clear the input after adding
            document.getElementById('message').value = '';
        }
    </script>
</body>
</html>
