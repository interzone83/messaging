<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Jessica</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.5em;
            flex-shrink: 0;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #f9f9f9;
        }
        .message {
            background: #e0e0e0;
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
        }
        .footer {
            background-color: #333;
            display: flex;
            padding: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .footer input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-right: 10px;
        }
        .footer button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">Jessica</div>
    <div class="chat-container">
        <div class="message">Hi there! How are you today?</div>
        <div class="message">I'm doing well, thank you!</div>
        <!-- More messages can go here -->
    </div>
    <div class="footer">
        <input type="text" placeholder="Type a message...">
        <button>Send</button>
    </div>
</body>
</html>
